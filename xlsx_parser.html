<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XLSX Parser</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', 'Segoe UI', system-ui, sans-serif;
      background: #fff;
      color: #202124;
      padding: 12px;
      font-size: 13px;
    }

    /* Drop zone */
    .drop-zone {
      border: 1.5px dashed #dadce0;
      border-radius: 8px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color .15s, background .15s;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: #1a73e8;
      background: #f0f4ff;
    }

    .drop-zone.has-file {
      border-style: solid;
      border-color: #34a853;
      background: #f6fbf8;
    }

    .drop-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }

    .drop-icon { font-size: 24px; line-height: 1; margin-bottom: 6px; }
    .drop-label { font-size: 13px; font-weight: 500; color: #3c4043; }
    .drop-hint  { font-size: 11px; color: #80868b; margin-top: 2px; }

    /* Sheet selector */
    .sheet-row {
      display: none;
      margin-top: 8px;
      align-items: center;
      gap: 8px;
    }

    .sheet-row label { color: #5f6368; white-space: nowrap; font-size: 12px; }

    select {
      flex: 1;
      border: 1px solid #dadce0;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      background: #fff;
      color: #202124;
      outline: none;
      cursor: pointer;
    }

    select:focus { border-color: #1a73e8; }

    /* Preview */
    .preview-wrap { display: none; margin-top: 10px; }

    .preview-meta {
      font-size: 11px;
      color: #80868b;
      margin-bottom: 4px;
    }

    .preview-meta b { color: #3c4043; font-weight: 600; }

    .table-wrap {
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      overflow: auto;
      max-height: 160px;
    }

    table { border-collapse: collapse; font-size: 11px; width: 100%; }

    th {
      background: #f8f9fa;
      color: #1a73e8;
      font-weight: 600;
      padding: 5px 10px;
      text-align: left;
      white-space: nowrap;
      border-bottom: 1px solid #e0e0e0;
      position: sticky; top: 0;
    }

    td {
      padding: 4px 10px;
      color: #3c4043;
      border-bottom: 1px solid #f1f3f4;
      white-space: nowrap;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8f9fa; }

    /* Actions */
    .actions { display: flex; gap: 6px; margin-top: 10px; }

    .btn-send {
      flex: 1;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-send:hover:not(:disabled) { background: #1557b0; }
    .btn-send:disabled { background: #dadce0; color: #80868b; cursor: not-allowed; }

    .btn-reset {
      background: none;
      border: 1px solid #dadce0;
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      color: #5f6368;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-reset:hover { background: #f8f9fa; }

    /* Status */
    .status {
      display: none;
      margin-top: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.4;
    }

    .status.info    { background: #e8f0fe; color: #1a73e8; }
    .status.success { background: #e6f4ea; color: #137333; }
    .status.error   { background: #fce8e6; color: #c5221f; }
  </style>
</head>
<body>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".xlsx,.xls,.ods,.csv" />
    <div class="drop-icon" id="dropIcon">📄</div>
    <div class="drop-label" id="dropLabel">Перетащите файл или нажмите</div>
    <div class="drop-hint">.xlsx · .xls · .ods · .csv</div>
  </div>

  <div class="sheet-row" id="sheetRow">
    <label>Лист:</label>
    <select id="sheetSelect"></select>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <div class="preview-meta" id="previewMeta"></div>
    <div class="table-wrap">
      <table id="previewTable"></table>
    </div>
  </div>

  <div class="actions">
    <button class="btn-send" id="sendBtn" disabled>Отправить в таблицу</button>
    <button class="btn-reset" id="resetBtn">Сбросить</button>
  </div>

  <div class="status" id="status"></div>

<script>
  let workbook = null;
  let currentCsv = '';
  let currentMeta = {};

  const fileInput   = document.getElementById('fileInput');
  const dropZone    = document.getElementById('dropZone');
  const sheetRow    = document.getElementById('sheetRow');
  const sheetSelect = document.getElementById('sheetSelect');
  const previewWrap = document.getElementById('previewWrap');
  const sendBtn     = document.getElementById('sendBtn');
  const statusEl    = document.getElementById('status');

  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) processFile(fileInput.files[0]);
  });

  sheetSelect.addEventListener('change', () => renderSheet(sheetSelect.value));

  function processFile(file) {
    showStatus('info', 'Читаю файл…');
    const reader = new FileReader();
    reader.onload = e => {
      try {
        workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: true });
        sheetSelect.innerHTML = '';
        workbook.SheetNames.forEach(name => {
          const o = document.createElement('option');
          o.value = o.textContent = name;
          sheetSelect.appendChild(o);
        });
        sheetRow.style.display = workbook.SheetNames.length > 1 ? 'flex' : 'none';
        renderSheet(workbook.SheetNames[0]);
        dropZone.classList.add('has-file');
        document.getElementById('dropIcon').textContent = '✅';
        document.getElementById('dropLabel').textContent = file.name;
      } catch (err) {
        showStatus('error', 'Не удалось прочитать файл: ' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function renderSheet(sheetName) {
    const ws  = workbook.Sheets[sheetName];
    const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    const rows = aoa.length;
    const cols = aoa.reduce((m, r) => Math.max(m, r.length), 0);

    currentCsv  = XLSX.utils.sheet_to_csv(ws);
    currentMeta = { sheetName, rows, cols, fileName: fileInput.files[0]?.name || 'file' };

    document.getElementById('previewMeta').innerHTML =
      `<b>${rows}</b> строк · <b>${cols}</b> столбцов · лист «${sheetName}»`;

    const table = document.getElementById('previewTable');
    table.innerHTML = '';
    aoa.slice(0, 6).forEach((row, ri) => {
      const tr = document.createElement('tr');
      row.slice(0, 8).forEach(cell => {
        const el = document.createElement(ri === 0 ? 'th' : 'td');
        el.textContent = cell ?? '';
        tr.appendChild(el);
      });
      table.appendChild(tr);
    });

    previewWrap.style.display = 'block';
    sendBtn.disabled = false;
    hideStatus();
  }

  sendBtn.addEventListener('click', () => {
    if (!currentCsv) return;
    sendBtn.disabled = true;
    showStatus('info', 'Отправляю…');

    const payload = { type: 'XLSX_PARSER_CSV', csv: currentCsv, meta: currentMeta, timestamp: Date.now() };

    if (window.parent && window.parent !== window) {
      window.parent.postMessage(JSON.stringify(payload), '*');
    } else {
      console.log('[XLSX Parser]', payload);
    }

    window.addEventListener('message', function ack(e) {
      try {
        const msg = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
        if (msg.type !== 'XLSX_PARSER_ACK') return;
        window.removeEventListener('message', ack);
        sendBtn.disabled = false;
        if (msg.status === 'ok') {
          showStatus('success', `Готово — записано ${msg.written} строк → «${msg.targetSheet}»`);
        } else {
          showStatus('error', 'Ошибка: ' + msg.error);
        }
      } catch (_) {}
    });

    setTimeout(() => { sendBtn.disabled = false; }, 30000);
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    workbook = null; currentCsv = ''; currentMeta = {};
    fileInput.value = '';
    dropZone.classList.remove('has-file');
    document.getElementById('dropIcon').textContent = '📄';
    document.getElementById('dropLabel').textContent = 'Перетащите файл или нажмите';
    sheetRow.style.display = 'none';
    previewWrap.style.display = 'none';
    sendBtn.disabled = true;
    hideStatus();
  });

  function showStatus(type, msg) {
    statusEl.className = 'status ' + type;
    statusEl.textContent = msg;
    statusEl.style.display = 'block';
  }

  function hideStatus() { statusEl.style.display = 'none'; }

  window.addEventListener('message', e => {
    try {
      const msg = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
      if (msg.type === 'XLSX_PARSER_PING') { /* sidebar ready */ }
    } catch(_) {}
  });
</script>
</body>
</html>
